<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>PomoBlock</title>
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PomoBlock" />
    <link rel="apple-touch-icon" href="/Pomodoro-Timeblock/icon-192.png" />
    <link rel="manifest" href="/Pomodoro-Timeblock/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <!-- Apply saved theme before React renders to avoid flash -->
    <script>try{var s=JSON.parse(localStorage.getItem('pomodoro-app-settings')||'{}');if(s.theme!=='dark')document.documentElement.dataset.theme='light';}catch(e){}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
